services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dutyfree_secret_2026}
      POSTGRES_DB: dutyfree_khalil
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-dutyfree_secret_2026}@postgres:5432/dutyfree_khalil?schema=public
      JWT_SECRET: ${JWT_SECRET:-khalil-dutyfree-jwt-secret-2026}
      PORT: "5000"
      UPLOAD_DIR: /app/uploads
      DEADLINE_DATE: "2026-07-08T23:59:59.000Z"
    volumes:
      - uploads:/app/uploads
    expose:
      - "5000"

  client:
    build:
      context: ./client
      args:
        NEXT_PUBLIC_API_URL: https://khalildeals.abbtn.com/api
    restart: always
    depends_on:
      - server
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    restart: always
    depends_on:
      - client
      - server
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/lib/letsencrypt
      - uploads:/uploads:ro

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  pgdata:
  uploads:
  certbot-etc:
  certbot-var:
